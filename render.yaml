services:
  # Backend API Service
  - type: web
    name: lumen-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumen-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: lumen-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: GOOGLE_API_KEY
        sync: false # You will paste your Gemini key in the Render dashboard

  # Redis Cache
  - type: redis
    name: lumen-redis
    plan: free
    ipAllowList: [] # Restrict access to internal network only

databases:
  - name: lumen-db
    plan: free
