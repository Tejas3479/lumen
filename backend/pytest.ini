[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    asyncio: marks tests as async (auto-detected via asyncio_mode=auto)
    slow: marks tests as slow (requires external services)
    integration: marks integration tests that require a live database
log_cli = true
log_cli_level = WARNING
